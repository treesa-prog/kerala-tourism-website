  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
      <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Navbar</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link active" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                    <li class="nav-item"><a class="nav-link" href="districts.html">District</a></li>
                </ul>
            </div>
        </div>
    </nav>

  <div class="banner">
    <img src="https://regalindiatours.com/assets/image/slider/banner2.jpg" alt="Kerala">
    <div class="text-center">
      <h1>Contact Us</h1>
    </div>
  </div>

  <div class="container my-5">
    <div class="row justify-content-center">
      <div class="col-md-7">

        <div class="row mb-3">
          <div class="col">
            <label>First Name</label>
            <input type="text" class="form-control">
          </div>
          <div class="col">
            <label>Last Name</label>
            <input type="text" class="form-control">
          </div>
        </div>

        <div class="mb-3">
          <label>Email</label>
          <input type="email" class="form-control">
        </div>

        <div class="mb-3">
          <label>Phone</label>
          <input type="tel" class="form-control">
        </div>

        <div class="mb-3">
          <label>Message</label>
          <textarea class="form-control" rows="4" placeholder="Write your message..."></textarea>
        </div>

        <button class="btn btn-success px-4">Send Message</button>

      </div>
    </div>
  </div>
