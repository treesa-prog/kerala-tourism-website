<!-- CONTACT SECTION -->
<div class="container d-flex justify-content-center align-items-center contact-section">

  <div class="col-md-6 contact-box">

    <h2 class="text-center mb-4">Contact Anime World</h2>

    <form>
      <div class="mb-3">
        <label class="form-label">Name</label>
        <input type="text" class="form-control" placeholder="Enter your name">
      </div>

      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" placeholder="Enter your email">
      </div>

      <div class="mb-3">
        <label class="form-label">Message</label>
        <textarea class="form-control" rows="4" placeholder="Write your message..."></textarea>
      </div>

      <div class="text-center">
        <button type="submit" class="btn btn-anime px-4">Send Message</button>
      </div>
    </form>

    <!-- Contact Info -->
    <div class="mt-4 text-center">
      <p><i class="fas fa-envelope icon"></i> animeworld@gmail.com</p>
      <p><i class="fas fa-phone icon"></i> +91 98765 43210</p>
    </div>

  </div>

</div>
